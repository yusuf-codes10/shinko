<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Left dark blue gradient -->
    <linearGradient id="gradLeft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E2F7A"/>
      <stop offset="100%" stop-color="#0D1A52"/>
    </linearGradient>

    <!-- Middle blue gradient -->
    <linearGradient id="gradMiddle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2846E8"/>
      <stop offset="100%" stop-color="#152C9E"/>
    </linearGradient>

    <!-- Purple gradient -->
    <linearGradient id="gradPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B3FF2"/>
      <stop offset="100%" stop-color="#4A1FC7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <!-- <rect width="512" height="512" fill="black"/> -->

  <!-- Left tall column -->
  <rect
    x="120"
    y="120"
    width="58"
    height="240"
    rx="0"
    fill="url(#gradLeft)"
  />

  <!-- Middle tall column -->
  <rect
    x="198"
    y="120"
    width="58"
    height="240"
    rx="0"
    fill="url(#gradMiddle)"
  />

  <!-- Top right horizontal -->
  <rect
    x="276"
    y="170"
    width="116"
    height="42"
    rx="0"
    fill="url(#gradMiddle)"
  />

  <!-- Middle right horizontal -->
  <rect
    x="276"
    y="232"
    width="116"
    height="42"
    rx="0"
    fill="url(#gradPurple)"
  />

  <!-- Bottom right block -->
  <rect
    x="276"
    y="294"
    width="116"
    height="66"
    rx="0"
    fill="url(#gradPurple)"
  />
</svg>